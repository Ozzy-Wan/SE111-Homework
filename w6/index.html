<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Dylan Osborn">
    <meta name="description" content="Pay Calculator">
    <title>Pay Calculator</title>
</head>
<body>

    <h1>Pay Calculator</h1>

    <div id="output"></div>

    <script>

        var hourlyPay = Number(prompt("Enter hourly pay"));
        var hoursWorked = Number(prompt("Enter hours worked per week"));
        var taxRate = Number(prompt("Enter tax rate as a decimal"));

        var grossPay = hourlyPay * hoursWorked * 2;
        var uncleSam = grossPay * taxRate;
        var netPay = grossPay - uncleSam;

        alert("Gross Pay: $" + grossPay.toFixed(2) + "\nUncle Sam's Share: $" + uncleSam.toFixed(2) + "\nNet Pay: $" + netPay.toFixed(2));

        console.log("Gross Pay: $" + grossPay.toFixed(2));
        console.log("Uncle Sam's Share: $" + uncleSam.toFixed(2));
        console.log("Net Pay: $" + netPay.toFixed(2));

        document.getElementById("output").innerHTML =
            "<p>Gross Pay: $" + grossPay.toFixed(2) + "</p>" +
            "<p>Uncle Sam's Share: $" + uncleSam.toFixed(2) + "</p>" +
            "<p>Net Pay: $" + netPay.toFixed(2) + "</p>";

    </script>

</body>
</html>
